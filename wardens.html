<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: header('Warden Management - Smart HMS')}"></head>

<body>

    <div th:replace="~{layout :: sidebar('wardens')}"></div>

    <div class="main-wrapper">
        <div th:replace="~{layout :: navbar}"></div>

        <div class="content-padding">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-800 mb-0">Warden Management</h3>
                <a th:href="@{/admin/wardens/add}" class="btn btn-primary d-flex align-items-center gap-2">
                    <i class="bi bi-person-plus"></i> <span>Add New Warden</span>
                </a>
            </div>

            <div class="card border-0 shadow-sm overflow-hidden text-nowrap">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead>
                            <tr>
                                <th class="ps-4">FullName</th>
                                <th>Contact Number</th>
                                <th>Shift Assignment</th>
                                <th>System Username</th>
                                <th class="text-end pe-4">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="warden : ${wardens}">
                                <td class="ps-4">
                                    <div class="d-flex align-items-center gap-3">
                                        <div class="avatar-sm bg-primary-subtle text-primary rounded-circle d-flex align-items-center justify-content-center"
                                            style="width: 38px; height: 38px;">
                                            <i class="bi bi-shield-shaded"></i>
                                        </div>
                                        <span class="fw-700" th:text="${warden.name}">Jane Smith</span>
                                    </div>
                                </td>
                                <td class="fw-600" th:text="${warden.contact}">9123456780</td>
                                <td>
                                    <span class="badge bg-light text-dark border px-3 py-2 fw-600">
                                        <i class="bi bi-clock me-1 text-primary"></i> <span
                                            th:text="${warden.shiftDetails}">Day Shift</span>
                                    </span>
                                </td>
                                <td>
                                    <code class="bg-light px-2 py-1 rounded text-primary fw-600"
                                        th:text="${warden.user.username}">jane_w</code>
                                </td>
                                <td class="text-end pe-4">
                                    <div class="d-flex justify-content-end gap-2">
                                        <button class="btn btn-sm btn-light border text-primary"><i
                                                class="bi bi-pencil-square"></i></button>
                                        <button class="btn btn-sm btn-light border text-danger"><i
                                                class="bi bi-trash3"></i></button>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(wardens)}">
                                <td colspan="5" class="text-center py-5 text-muted">
                                    <i class="bi bi-people fs-2 d-block mb-3"></i>
                                    No wardens assigned yet.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
