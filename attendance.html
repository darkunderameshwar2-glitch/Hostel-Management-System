<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: header('My Attendance - Smart HMS')}"></head>

<body>

    <div th:replace="~{layout :: sidebar('my-attendance')}"></div>

    <body>

        <div th:replace="~{layout :: sidebar('my-attendance')}"></div>

        <div class="main-wrapper">
            <div th:replace="~{layout :: navbar}"></div>

            <div class="content-padding">
                <div class="mb-5 d-flex justify-content-between align-items-center">
                    <div>
                        <h2 class="fw-800 mb-1">Attendance History</h2>
                        <p class="text-muted fw-600 mb-0">Personal record of your daily gate activities.</p>
                    </div>
                    <div class="d-flex gap-3">
                        <div class="text-end">
                            <div class="small fw-700 text-muted text-uppercase mb-1">Current Month</div>
                            <h4 class="fw-800 text-primary mb-0" th:text="${#lists.size(attendances)}">0</h4>
                        </div>
                    </div>
                </div>

                <div class="card border-0 shadow-sm overflow-hidden">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="bg-light">
                                <tr>
                                    <th class="ps-4">Activity Date</th>
                                    <th>Entry Timestamp</th>
                                    <th>Exit Timestamp</th>
                                    <th class="text-end pe-4">Presence Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="attendance : ${attendances}">
                                    <td class="ps-4 fw-800 text-dark"
                                        th:text="${#temporals.format(attendance.date, 'dd MMM yyyy')}">26 Feb, 2024</td>
                                    <td class="fw-600 text-muted">
                                        <div class="d-flex align-items-center gap-2">
                                            <i class="bi bi-box-arrow-in-right text-success small"></i>
                                            <span
                                                th:text="${#temporals.format(attendance.entryTime, 'HH:mm')}">10:00</span>
                                        </div>
                                    </td>
                                    <td class="fw-600 text-muted">
                                        <div class="d-flex align-items-center gap-2">
                                            <i class="bi bi-box-arrow-left text-danger small"></i>
                                            <span
                                                th:text="${attendance.exitTime != null ? #temporals.format(attendance.exitTime, 'HH:mm') : 'Active'}"
                                                th:classappend="${attendance.exitTime == null ? 'text-warning italic fw-800' : ''}">18:00</span>
                                        </div>
                                    </td>
                                    <td class="text-end pe-4">
                                        <span
                                            class="badge bg-success-subtle text-success border border-success-subtle px-3 py-2 fw-700"
                                            th:text="${attendance.status}">PRESENT</span>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(attendances)}">
                                    <td colspan="4" class="text-center py-5 text-muted">
                                        <i class="bi bi-calendar-x fs-1 d-block mb-3"></i>
                                        No attendance records found for the current period.
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

    </body>

</body>

</html>
