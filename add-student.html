<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: header('Add Student - Smart HMS')}"></head>

<body>

    <div th:replace="~{layout :: sidebar('students')}"></div>

    <div class="main-wrapper">
        <div th:replace="~{layout :: navbar}"></div>

        <div class="content-padding">
            <div class="mb-5">
                <nav aria-label="breadcrumb" class="mb-3">
                    <ol class="breadcrumb bg-light px-3 py-2 rounded-3 small fw-700">
                        <li class="breadcrumb-item"><a th:href="@{/admin/students}"
                                class="text-decoration-none text-muted">Students</a></li>
                        <li class="breadcrumb-item active text-primary" aria-current="page">Add New Student</li>
                    </ol>
                </nav>
                <h2 class="fw-800 mb-2">Register New Student</h2>
                <p class="text-muted fw-600 mb-0">Onboard a new resident into the Smart HMS ecosystem.</p>
            </div>

            <div class="row">
                <div class="col-xl-10">
                    <div class="card border-0 shadow-sm p-4 rounded-4">
                        <form th:action="@{/admin/students/save}" method="post">
                            <h5 class="fw-800 text-primary mb-4 d-flex align-items-center gap-2">
                                <i class="bi bi-person-badge"></i> Personal & Academic Details
                            </h5>

                            <div class="row g-4 mb-4">
                                <div class="col-md-6">
                                    <label class="form-label fw-800 text-dark small text-uppercase">Full Name</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-light text-muted"><i
                                                class="bi bi-person"></i></span>
                                        <input type="text" name="name"
                                            class="form-control rounded-end-3 border-light bg-light p-3 fw-600" required
                                            placeholder="John Doe">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-800 text-dark small text-uppercase">Student ID</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-light text-muted"><i
                                                class="bi bi-hash"></i></span>
                                        <input type="text" name="studentId"
                                            class="form-control rounded-end-3 border-light bg-light p-3 fw-800 text-primary"
                                            readonly placeholder="System Generated">
                                    </div>
                                    <div class="extra-small text-muted mt-2 fw-600 italic">Sequential ID is
                                        automatically assigned upon registration.</div>
                                </div>
                            </div>

                            <div class="row g-4 mb-5">
                                <div class="col-md-6">
                                    <label class="form-label fw-800 text-dark small text-uppercase">Department /
                                        Course</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-light text-muted"><i
                                                class="bi bi-book"></i></span>
                                        <input type="text" name="department"
                                            class="form-control rounded-end-3 border-light bg-light p-3 fw-600" required
                                            placeholder="e.g. Computer Science & Engineering">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-800 text-dark small text-uppercase">Contact
                                        Number</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-light text-muted"><i
                                                class="bi bi-telephone"></i></span>
                                        <input type="text" name="contact"
                                            class="form-control rounded-end-3 border-light bg-light p-3 fw-600" required
                                            placeholder="+91 00000 00000">
                                    </div>
                                </div>
                            </div>

                            <hr class="my-5 border-light">

                            <h5 class="fw-800 text-primary mb-4 d-flex align-items-center gap-2">
                                <i class="bi bi-shield-lock"></i> Digital Account Credentials
                            </h5>

                            <div class="row g-4 mb-5">
                                <div class="col-md-4">
                                    <label class="form-label fw-800 text-dark small text-uppercase">Username</label>
                                    <input type="text" name="user.username"
                                        class="form-control rounded-3 border-light bg-light p-3 fw-600" required
                                        placeholder="johndoe123">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-800 text-dark small text-uppercase">Email
                                        Address</label>
                                    <input type="email" name="user.email"
                                        class="form-control rounded-3 border-light bg-light p-3 fw-600" required
                                        placeholder="john.doe@university.edu">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-800 text-dark small text-uppercase">Initial
                                        Password</label>
                                    <input type="password" name="password"
                                        class="form-control rounded-3 border-light bg-light p-3 fw-600" required
                                        placeholder="Min 8 characters">
                                </div>
                            </div>

                            <div class="d-flex gap-3 mt-5">
                                <button type="submit"
                                    class="btn btn-primary px-5 py-3 fw-800 rounded-3 shadow-sm d-flex align-items-center gap-2">
                                    <i class="bi bi-person-plus-fill"></i> <span>Register Student</span>
                                </button>
                                <a th:href="@{/admin/students}"
                                    class="btn btn-light px-5 py-3 fw-800 rounded-3 border">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
