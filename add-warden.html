<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: header('Add Warden - Smart HMS')}"></head>

<body>

    <div th:replace="~{layout :: sidebar('wardens')}"></div>

    <div class="main-wrapper">
        <div th:replace="~{layout :: navbar}"></div>

        <div class="content-padding">
            <div class="mb-5">
                <nav aria-label="breadcrumb" class="mb-3">
                    <ol class="breadcrumb bg-light px-3 py-2 rounded-3 small fw-700">
                        <li class="breadcrumb-item"><a th:href="@{/admin/wardens}"
                                class="text-decoration-none text-muted">Wardens</a></li>
                        <li class="breadcrumb-item active text-primary" aria-current="page">Add New Warden</li>
                    </ol>
                </nav>
                <h2 class="fw-800 mb-2">Assign New Warden</h2>
                <p class="text-muted fw-600 mb-0">Create an administrative account for hostel management personnel.</p>
            </div>

            <div class="row">
                <div class="col-xl-10">
                    <div class="card border-0 shadow-sm p-4 rounded-4">
                        <form th:action="@{/admin/wardens/save}" method="post">
                            <h5 class="fw-800 text-primary mb-4 d-flex align-items-center gap-2">
                                <i class="bi bi-person-badge"></i> Warden Profile Details
                            </h5>

                            <div class="row g-4 mb-4">
                                <div class="col-md-6">
                                    <label class="form-label fw-800 text-dark small text-uppercase">Full Name</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-light text-muted"><i
                                                class="bi bi-person"></i></span>
                                        <input type="text" name="name"
                                            class="form-control rounded-end-3 border-light bg-light p-3 fw-600" required
                                            placeholder="Enter full name">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-800 text-dark small text-uppercase">Primary
                                        Contact</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-light text-muted"><i
                                                class="bi bi-telephone"></i></span>
                                        <input type="text" name="contact"
                                            class="form-control rounded-end-3 border-light bg-light p-3 fw-600" required
                                            placeholder="10-digit mobile number">
                                    </div>
                                </div>
                            </div>

                            <div class="mb-5">
                                <label class="form-label fw-800 text-dark small text-uppercase">Duty Shift
                                    Details</label>
                                <textarea name="shiftDetails"
                                    class="form-control rounded-3 border-light bg-light p-3 fw-600" rows="3"
                                    placeholder="e.g. Block A - Night Shift (10 PM to 6 AM)"></textarea>
                            </div>

                            <hr class="my-5 border-light">

                            <h5 class="fw-800 text-primary mb-4 d-flex align-items-center gap-2">
                                <i class="bi bi-shield-lock"></i> Administrative Access
                            </h5>

                            <div class="row g-4 mb-5">
                                <div class="col-md-4">
                                    <label class="form-label fw-800 text-dark small text-uppercase">Username</label>
                                    <input type="text" name="user.username"
                                        class="form-control rounded-3 border-light bg-light p-3 fw-600" required
                                        placeholder="warden_username">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-800 text-dark small text-uppercase">Official
                                        Email</label>
                                    <input type="email" name="user.email"
                                        class="form-control rounded-3 border-light bg-light p-3 fw-600" required
                                        placeholder="warden@hms.com">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-800 text-dark small text-uppercase">Access
                                        Password</label>
                                    <input type="password" name="password"
                                        class="form-control rounded-3 border-light bg-light p-3 fw-600" required
                                        placeholder="Standard HMS password">
                                </div>
                            </div>

                            <div class="d-flex gap-3 mt-5">
                                <button type="submit"
                                    class="btn btn-primary px-5 py-3 fw-800 rounded-3 shadow-sm d-flex align-items-center gap-2">
                                    <i class="bi bi-shield-check"></i> <span>Assign warden Role</span>
                                </button>
                                <a th:href="@{/admin/wardens}"
                                    class="btn btn-light px-5 py-3 fw-800 rounded-3 border">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
