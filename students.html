<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: header('Student Management - Smart HMS')}"></head>

<body>

    <div th:replace="~{layout :: sidebar('students')}"></div>

    <div class="main-wrapper">
        <div th:replace="~{layout :: navbar}"></div>

        <div class="content-padding">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-800 mb-0">Student Management</h3>
                <a th:href="@{/admin/students/add}" class="btn btn-primary d-flex align-items-center gap-2">
                    <i class="bi bi-plus-circle"></i> <span>Add New Student</span>
                </a>
            </div>

            <div class="card border-0 shadow-sm overflow-hidden">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead>
                            <tr>
                                <th class="ps-4">Student ID</th>
                                <th>Full Name</th>
                                <th>Department</th>
                                <th>Contact</th>
                                <th>Room Allotment</th>
                                <th class="text-end pe-4">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="student : ${students}">
                                <td class="ps-4">
                                    <span class="fw-700 text-primary" th:text="${student.studentId}">S101</span>
                                </td>
                                <td>
                                    <div class="d-flex align-items-center gap-3">
                                        <div class="avatar-sm bg-light rounded-circle d-flex align-items-center justify-content-center"
                                            style="width: 32px; height: 32px;">
                                            <i class="bi bi-person text-muted"></i>
                                        </div>
                                        <span class="fw-600" th:text="${student.name}">John Doe</span>
                                    </div>
                                </td>
                                <td th:text="${student.department}">Computer Science</td>
                                <td th:text="${student.contact}">9876543210</td>
                                <td>
                                    <span th:if="${student.room != null}"
                                        class="badge bg-primary-subtle text-primary border border-primary-subtle px-3 py-2">
                                        <i class="bi bi-door-closed me-1"></i> <span
                                            th:text="${student.room.roomNumber}">101</span>
                                    </span>
                                    <span th:if="${student.room == null}"
                                        class="badge bg-secondary-subtle text-secondary border border-secondary-subtle px-3 py-2">
                                        <i class="bi bi-dash-circle me-1"></i> Unassigned
                                    </span>
                                </td>
                                <td class="text-end pe-4">
                                    <div class="d-flex justify-content-end gap-2">
                                        <button class="btn btn-sm btn-light text-primary border"><i
                                                class="bi bi-pencil-square"></i></button>
                                        <button class="btn btn-sm btn-light text-danger border"><i
                                                class="bi bi-trash3"></i></button>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(students)}">
                                <td colspan="6" class="text-center py-5 text-muted">
                                    <i class="bi bi-inbox fs-2 d-block mb-3"></i>
                                    No students registered in the system yet.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
