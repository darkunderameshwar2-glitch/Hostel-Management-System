<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: header('File Complaint - Smart HMS')}"></head>

<body>

    <div th:replace="~{layout :: sidebar('complaints')}"></div>

    <body>

        <div th:replace="~{layout :: sidebar('complaints')}"></div>

        <div class="main-wrapper">
            <div th:replace="~{layout :: navbar}"></div>

            <div class="content-padding">
                <div class="mb-5">
                    <nav aria-label="breadcrumb" class="mb-3">
                        <ol class="breadcrumb bg-light px-3 py-2 rounded-3 small fw-700">
                            <li class="breadcrumb-item"><a th:href="@{/student/complaints}"
                                    class="text-decoration-none text-muted">Complaints</a></li>
                            <li class="breadcrumb-item active text-primary" aria-current="page">File New Issue</li>
                        </ol>
                    </nav>
                    <h2 class="fw-800 mb-2">Report a Problem</h2>
                    <p class="text-muted fw-600 mb-0">Help us improve your hostel experience by reporting maintenance or
                        facility issues.</p>
                </div>

                <div class="row">
                    <div class="col-xl-8">
                        <div class="card border-0 shadow-sm p-4 rounded-4">
                            <form th:action="@{/student/complaints/save}" th:object="${complaint}" method="post">
                                <div class="mb-4">
                                    <label class="form-label fw-800 text-dark small text-uppercase">Description of
                                        Issue</label>
                                    <textarea th:field="*{description}"
                                        class="form-control rounded-3 border-light bg-light p-3 fw-600" rows="5"
                                        required
                                        placeholder="Provide details about the issue (e.g., Room 204 fan is making noise, Water leakage in washroom, etc.)"></textarea>
                                </div>

                                <div
                                    class="alert bg-danger-subtle border-danger-subtle text-danger rounded-3 d-flex align-items-center gap-3 mb-4">
                                    <i class="bi bi-exclamation-circle-fill fs-4"></i>
                                    <div class="small fw-600">
                                        Our maintenance team will review your report within 24 hours. You can track
                                        status in the complaints history.
                                    </div>
                                </div>

                                <div class="d-flex gap-3 mt-5">
                                    <button type="submit"
                                        class="btn btn-primary px-5 py-3 fw-800 rounded-3 shadow-sm">Submit
                                        Report</button>
                                    <a th:href="@{/student/complaints}"
                                        class="btn btn-light px-5 py-3 fw-800 rounded-3 border">Cancel</a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </body>

</body>

</html>
